<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 24px;
      background: #ebebeb;
      color: #222;
    }

    h1 {
      font-size: 1.5em;
      font-weight: 700;
      text-align: center;
      margin-bottom: 5px;
      color: #111;
    }
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.88em;
      margin-bottom: 32px;
    }

    /* ── Sample card ─────────────────────────────────────────── */
    .sample-card {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 22px 24px;
      margin-bottom: 32px;
    }
    .sample-title {
      font-size: 1.05em;
      font-weight: 700;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ddd;
      color: #111;
    }

    /* ── Input section ───────────────────────────────────────── */
    .input-section {
      margin-bottom: 22px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e4e4e4;
    }
    .input-spec-img {
      display: block;
      max-width: 500px;
      width: 100%;
      height: auto;
      border: 1px solid #bbb;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .audio-item {
      margin-top: 6px;
    }
    .audio-item-label {
      font-size: 0.78em;
      color: #555;
      margin-bottom: 3px;
    }
    .audio-item audio {
      display: block;
      width: 100%;
      max-width: 500px;
      height: 30px;
    }

    /* ── System block ────────────────────────────────────────── */
    .system-block {
      margin-bottom: 18px;
    }
    .system-title {
      font-size: 0.78em;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }
    .cells-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    /* ── Cell ────────────────────────────────────────────────── */
    .cell {
      flex: 1;
      min-width: 200px;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 9px 10px;
      background: #f7f7f7;
    }
    .baselines-section .cell {
      min-width: 220px;
    }
    .cell-header {
      font-size: 0.8em;
      font-style: italic;
      color: #444;
      text-align: center;
      margin-bottom: 8px;
    }
    .cell .audio-item {
      margin-top: 0;
      margin-bottom: 5px;
    }
    .cell .audio-item-label {
      font-size: 0.72em;
    }
    .cell .audio-item audio {
      max-width: none;
      height: 30px;
    }

    /* ── References ──────────────────────────────────────────── */
    .references {
      margin-top: 40px;
      padding-top: 14px;
      border-top: 1px solid #ccc;
      font-size: 0.78em;
      color: #888;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <h1>Audio demo</h1>
  <p class="subtitle">Anonymous submission</p>

  <div id="container"></div>

  <div class="references">
    <p>[1] ... (Deep Salience)</p>
    <p>[2] ... (Basic Pitch)</p>
    <p>[3] ... (Timbre Trap)</p>
  </div>

<script>
// ── Data ─────────────────────────────────────────────────────────
const SAMPLES = [
  { id: "000852", dir: "000852_4.0", ytId: "1VTxnf2hZ0w" },
  { id: "001239", dir: "001239_4.0", ytId: "2m9rVrVNa6A" },
  { id: "001349", dir: "001349_4.0", ytId: "37UUg0fwzsw" },
  { id: "001376", dir: "001376_4.5", ytId: "3EcfiEc08zY" },
  { id: "001383", dir: "001383_5.0", ytId: "3FYXBkD5bYk" },
  { id: "001676", dir: "001676_4.3", ytId: "4G92jhdrbhs" },
  { id: "001902", dir: "001902_4.0", ytId: "54LSA7aZTBA" },
  { id: "002009", dir: "002009_5.0", ytId: "5Y_mT93tkvQ" },
  { id: "002037", dir: "002037_5.5", ytId: "5e8dnZnkLkw" },
  { id: "002044", dir: "002044_5.0", ytId: "5fzwZ3YnYi8" },
];

const GAMMAS = [0.0, 0.5, 1.0, 2.0, 3.0];

const BASELINES = [
  { suffix: "ds", label: "Deep Salience [1]" },
  { suffix: "bp", label: "Basic Pitch [2]" },
  { suffix: "tt", label: "Timbre Trap [3]" },
];

function audioPath(s, variant) {
  return `${s.dir}/${s.id}_${s.ytId}_${variant}.wav`;
}

// ── Channel routing via Web Audio API ────────────────────────────
// Shared AudioContext — created once, routed at DOM build time.
let sharedCtx = null;

function getCtx() {
  if (!sharedCtx) {
    try {
      sharedCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { return null; }
  }
  return sharedCtx;
}

// Resume context on first any-click (covers native audio controls too)
document.addEventListener("click", () => {
  if (sharedCtx && sharedCtx.state === "suspended") sharedCtx.resume();
}, { once: false });

function attachChannelRoute(audioEl, mode) {
  // Always resume on play, regardless of mode
  audioEl.addEventListener("play", () => {
    if (sharedCtx && sharedCtx.state === "suspended") sharedCtx.resume();
  });

  if (mode === "stereo") return;

  // Set up routing immediately (not lazily) so it's ready before first play
  const ctx = getCtx();
  if (!ctx) return;
  try {
    const src = ctx.createMediaElementSource(audioEl);
    const ch = mode === "left" ? 0 : 1;
    const split = ctx.createChannelSplitter(2);
    const merge = ctx.createChannelMerger(2);
    src.connect(split);
    split.connect(merge, ch, 0);
    split.connect(merge, ch, 1);
    merge.connect(ctx.destination);
  } catch (e) {
    console.warn("Channel routing failed, playing stereo:", e);
  }
}

// ── UI helpers ───────────────────────────────────────────────────
function mkAudioItem(label, url, mode) {
  const item = document.createElement("div");
  item.className = "audio-item";

  const lbl = document.createElement("div");
  lbl.className = "audio-item-label";
  lbl.textContent = label;
  item.appendChild(lbl);

  const audio = document.createElement("audio");
  audio.src = url;
  audio.controls = true;
  audio.preload = "none";
  attachChannelRoute(audio, mode);
  item.appendChild(audio);

  return item;
}

function mkCell(sample, variant, headerLabel) {
  const cell = document.createElement("div");
  cell.className = "cell";

  const hdr = document.createElement("div");
  hdr.className = "cell-header";
  hdr.textContent = headerLabel;
  cell.appendChild(hdr);

  const url = audioPath(sample, variant);
  cell.appendChild(mkAudioItem("Rendered", url, "right"));
  cell.appendChild(mkAudioItem("Input+rendered", url, "stereo"));
  return cell;
}

function mkSystemBlock(title, entries, sample, extraClass) {
  const block = document.createElement("div");
  block.className = "system-block" + (extraClass ? " " + extraClass : "");

  const titleEl = document.createElement("div");
  titleEl.className = "system-title";
  titleEl.textContent = title;
  block.appendChild(titleEl);

  const row = document.createElement("div");
  row.className = "cells-row";
  for (const e of entries) {
    row.appendChild(mkCell(sample, e.variant, e.label));
  }
  block.appendChild(row);
  return block;
}

// ── Build sample card ─────────────────────────────────────────────
function buildSample(s, idx) {
  const card = document.createElement("div");
  card.className = "sample-card";

  const title = document.createElement("div");
  title.className = "sample-title";
  title.textContent = `Sample ${idx + 1}`;
  card.appendChild(title);

  // Input section: spectrogram + input audio player
  const inputSec = document.createElement("div");
  inputSec.className = "input-section";

  const img = document.createElement("img");
  img.src = `images/${s.id}_spec.png`;
  img.className = "input-spec-img";
  img.alt = "Mel spectrogram of input audio";
  inputSec.appendChild(img);

  const inputUrl = audioPath(s, "300k_sori_0.0");
  inputSec.appendChild(mkAudioItem("Input audio", inputUrl, "left"));
  card.appendChild(inputSec);

  // Sori (Proposed)
  card.appendChild(mkSystemBlock(
    "Sori (Proposed)",
    GAMMAS.map(g => ({ variant: `300k_sori_${g.toFixed(1)}`, label: `γ = ${g.toFixed(1)}` })),
    s
  ));

  // Sori (w/o DAT)
  card.appendChild(mkSystemBlock(
    "Sori (w/o DAT)",
    GAMMAS.map(g => ({ variant: `300k_sori_no_adv_${g.toFixed(1)}`, label: `γ = ${g.toFixed(1)}` })),
    s
  ));

  // Baselines
  card.appendChild(mkSystemBlock(
    "Baselines",
    BASELINES.map(b => ({ variant: b.suffix, label: b.label })),
    s,
    "baselines-section"
  ));

  return card;
}

// ── Render ────────────────────────────────────────────────────────
const container = document.getElementById("container");
SAMPLES.forEach((s, i) => container.appendChild(buildSample(s, i)));
</script>
</body>
</html>
